<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Busan Star 관리자</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-900">
  <div class="grid min-h-screen lg:grid-cols-[260px_1fr]">
    <aside class="border-r border-slate-200 bg-slate-950 text-white">
      <div class="border-b border-white/10 px-6 py-5">
        <div class="text-lg font-semibold">Busan Star 관리자</div>
        <div class="mt-1 text-sm text-slate-400">운영자 전용 페이지</div>
      </div>
      <nav class="space-y-1 px-4 py-4">
        <button onclick="showTab('dashboard')" class="nav-btn w-full rounded-2xl px-4 py-3 text-left text-sm font-medium hover:bg-white/10">대시보드</button>
        <button onclick="showTab('bookings')" class="nav-btn w-full rounded-2xl px-4 py-3 text-left text-sm font-medium hover:bg-white/10">예약 관리</button>
        <button onclick="showTab('pricing')" class="nav-btn w-full rounded-2xl px-4 py-3 text-left text-sm font-medium hover:bg-white/10">요금 관리</button>
        <button onclick="showTab('contact')" class="nav-btn w-full rounded-2xl px-4 py-3 text-left text-sm font-medium hover:bg-white/10">문의 링크 관리</button>
        <button onclick="showTab('text')" class="nav-btn w-full rounded-2xl px-4 py-3 text-left text-sm font-medium hover:bg-white/10">문구 관리</button>
      </nav>
    </aside>

    <main class="p-4 md:p-8">

      <!-- 대시보드 -->
      <section id="dashboard" class="tab-section">
        <div class="mb-6">
          <h1 class="text-3xl font-bold">대시보드</h1>
          <p class="mt-1 text-sm text-slate-500">예약 현황</p>
        </div>
        <div class="grid gap-4 md:grid-cols-3">
          <div class="rounded-3xl bg-white p-5 shadow-sm ring-1 ring-slate-200">
            <div class="text-sm text-slate-500">전체 예약</div>
            <div id="stat-total" class="mt-2 text-3xl font-bold">-</div>
          </div>
          <div class="rounded-3xl bg-white p-5 shadow-sm ring-1 ring-slate-200">
            <div class="text-sm text-slate-500">신규 요청</div>
            <div id="stat-new" class="mt-2 text-3xl font-bold">-</div>
          </div>
          <div class="rounded-3xl bg-white p-5 shadow-sm ring-1 ring-slate-200">
            <div class="text-sm text-slate-500">확정 예약</div>
            <div id="stat-confirmed" class="mt-2 text-3xl font-bold">-</div>
          </div>
        </div>
        <div class="mt-6 rounded-3xl bg-white p-5 shadow-sm ring-1 ring-slate-200">
          <div class="mb-4 text-lg font-semibold">최근 예약</div>
          <div id="recent-list" class="space-y-3 text-sm text-slate-500">불러오는 중...</div>
        </div>
      </section>

      <!-- 예약 관리 -->
      <section id="bookings" class="tab-section hidden">
        <div class="mb-6">
          <h1 class="text-3xl font-bold">예약 관리</h1>
          <p class="mt-1 text-sm text-slate-500">예약 목록 및 상세 정보</p>
        </div>
        <div class="grid gap-6 xl:grid-cols-[1.2fr_0.8fr]">
          <div class="rounded-3xl bg-white p-5 shadow-sm ring-1 ring-slate-200">
            <div class="mb-4 flex flex-wrap gap-3">
              <select id="filter-status" onchange="loadBookings()" class="rounded-2xl border border-slate-300 px-4 py-3 text-sm">
                <option value="">전체 상태</option>
                <option>신규</option><option>연락완료</option><option>확정</option><option>완료</option><option>취소</option>
              </select>
              <input id="filter-date" type="date" onchange="loadBookings()" class="rounded-2xl border border-slate-300 px-4 py-3 text-sm" />
              <button onclick="loadBookings()" class="rounded-2xl bg-slate-200 px-4 py-3 text-sm font-medium hover:bg-slate-300">새로고침</button>
            </div>
            <div class="overflow-x-auto">
              <table class="min-w-full text-sm">
                <thead>
                  <tr class="border-b border-slate-200 text-left text-slate-500">
                    <th class="px-3 py-3">이름</th><th class="px-3 py-3">날짜</th><th class="px-3 py-3">구간</th><th class="px-3 py-3">연락수단</th><th class="px-3 py-3">상태</th>
                  </tr>
                </thead>
                <tbody id="bookings-tbody">
                  <tr><td colspan="5" class="px-3 py-6 text-center text-slate-400">불러오는 중...</td></tr>
                </tbody>
              </table>
            </div>
          </div>

          <div class="rounded-3xl bg-white p-5 shadow-sm ring-1 ring-slate-200">
            <div class="mb-4 text-lg font-semibold">예약 상세</div>
            <div id="detail-empty" class="text-sm text-slate-400">목록에서 예약을 선택하세요.</div>
            <div id="detail-content" class="hidden grid gap-3 text-sm">
              <div class="rounded-2xl bg-slate-50 px-4 py-3"><div class="text-slate-500">이름</div><div id="d_name" class="mt-1 font-medium"></div></div>
              <div class="rounded-2xl bg-slate-50 px-4 py-3"><div class="text-slate-500">날짜 / 시간</div><div id="d_datetime" class="mt-1 font-medium"></div></div>
              <div class="rounded-2xl bg-slate-50 px-4 py-3"><div class="text-slate-500">항공편</div><div id="d_flight" class="mt-1 font-medium"></div></div>
              <div class="rounded-2xl bg-slate-50 px-4 py-3"><div class="text-slate-500">이용 유형</div><div id="d_type" class="mt-1 font-medium"></div></div>
              <div class="rounded-2xl bg-slate-50 px-4 py-3"><div class="text-slate-500">출발 / 도착</div><div id="d_route" class="mt-1 font-medium"></div></div>
              <div class="rounded-2xl bg-slate-50 px-4 py-3"><div class="text-slate-500">인원 / 캐리어</div><div id="d_group" class="mt-1 font-medium"></div></div>
              <div class="rounded-2xl bg-slate-50 px-4 py-3"><div class="text-slate-500">연락수단</div><div id="d_contact" class="mt-1 font-medium"></div></div>
              <div class="rounded-2xl bg-slate-50 px-4 py-3"><div class="text-slate-500">추가 요청</div><div id="d_request" class="mt-1 font-medium"></div></div>
              <div>
                <label class="mb-2 block text-sm font-medium">상태 변경</label>
                <select id="d_status" class="w-full rounded-2xl border border-slate-300 px-4 py-3">
                  <option>신규</option><option>연락완료</option><option>확정</option><option>완료</option><option>취소</option>
                </select>
              </div>
              <button onclick="saveStatus()" class="rounded-2xl bg-slate-900 px-4 py-3 text-sm font-semibold text-white">저장</button>
              <div id="saveMsg" class="hidden rounded-2xl bg-emerald-50 px-4 py-3 text-sm font-medium text-emerald-700">저장됨 ✓</div>
            </div>
          </div>
        </div>
      </section>

      <!-- 요금 관리 -->
      <section id="pricing" class="tab-section hidden">
        <div class="mb-6">
          <h1 class="text-3xl font-bold">요금 관리</h1>
          <p class="mt-1 text-sm text-slate-500">노출 요금 수정</p>
        </div>
        <div class="rounded-3xl bg-white p-5 shadow-sm ring-1 ring-slate-200">
          <div id="pricing-fields" class="grid gap-4 md:grid-cols-2">
            <div class="text-sm text-slate-400">불러오는 중...</div>
          </div>
          <button onclick="savePricing()" class="mt-5 rounded-2xl bg-slate-900 px-4 py-3 text-sm font-semibold text-white">요금 저장</button>
          <div id="pricing-msg" class="mt-3 hidden rounded-2xl bg-emerald-50 px-4 py-3 text-sm font-medium text-emerald-700">저장됨 ✓</div>
        </div>
      </section>

      <!-- 문의 링크 관리 -->
      <section id="contact" class="tab-section hidden">
        <div class="mb-6">
          <h1 class="text-3xl font-bold">문의 링크 관리</h1>
          <p class="mt-1 text-sm text-slate-500">메신저 링크 수정</p>
        </div>
        <div class="rounded-3xl bg-white p-5 shadow-sm ring-1 ring-slate-200">
          <div class="grid gap-4">
            <div><label class="mb-2 block text-sm font-medium">카카오톡</label><input id="s-link_kakao" class="w-full rounded-2xl border border-slate-300 px-4 py-3" /></div>
            <div><label class="mb-2 block text-sm font-medium">LINE</label><input id="s-link_line" class="w-full rounded-2xl border border-slate-300 px-4 py-3" /></div>
            <div><label class="mb-2 block text-sm font-medium">WeChat</label><input id="s-link_wechat" class="w-full rounded-2xl border border-slate-300 px-4 py-3" /></div>
            <div><label class="mb-2 block text-sm font-medium">Telegram</label><input id="s-link_telegram" class="w-full rounded-2xl border border-slate-300 px-4 py-3" /></div>
            <div><label class="mb-2 block text-sm font-medium">WhatsApp</label><input id="s-link_whatsapp" class="w-full rounded-2xl border border-slate-300 px-4 py-3" /></div>
          </div>
          <button onclick="saveSettings(['link_kakao','link_line','link_wechat','link_telegram','link_whatsapp'], 'contact-msg')" class="mt-5 rounded-2xl bg-slate-900 px-4 py-3 text-sm font-semibold text-white">링크 저장</button>
          <div id="contact-msg" class="mt-3 hidden rounded-2xl bg-emerald-50 px-4 py-3 text-sm font-medium text-emerald-700">저장됨 ✓</div>
        </div>
      </section>

      <!-- 문구 관리 -->
      <section id="text" class="tab-section hidden">
        <div class="mb-6">
          <h1 class="text-3xl font-bold">문구 관리</h1>
          <p class="mt-1 text-sm text-slate-500">고객 페이지 핵심 문구 수정</p>
        </div>
        <div class="rounded-3xl bg-white p-5 shadow-sm ring-1 ring-slate-200">
          <div class="grid gap-4">
            <div><label class="mb-2 block text-sm font-medium">메인 문구</label><input id="s-main_text" class="w-full rounded-2xl border border-slate-300 px-4 py-3" /></div>
            <div><label class="mb-2 block text-sm font-medium">서브 문구</label><input id="s-sub_text" class="w-full rounded-2xl border border-slate-300 px-4 py-3" /></div>
            <div><label class="mb-2 block text-sm font-medium">예약 완료 문구</label><textarea id="s-confirm_text" rows="4" class="w-full rounded-2xl border border-slate-300 px-4 py-3"></textarea></div>
          </div>
          <button onclick="saveSettings(['main_text','sub_text','confirm_text'], 'text-msg')" class="mt-5 rounded-2xl bg-slate-900 px-4 py-3 text-sm font-semibold text-white">문구 저장</button>
          <div id="text-msg" class="mt-3 hidden rounded-2xl bg-emerald-50 px-4 py-3 text-sm font-medium text-emerald-700">저장됨 ✓</div>
        </div>
      </section>

    </main>
  </div>

<script>
// ── Supabase 설정 ──────────────────────────────────────────
const SUPABASE_URL = 'https://onjsxjcpyqelfhgxupbn.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9uanN4amNweXFlbGZoZ3h1cGJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNzYxMjgsImV4cCI6MjA5MDg1MjEyOH0.tX-mroD0v6vNwsT0dk54QUcFv1j3Vf-CzodY_X71IoI';

async function sbFetch(path, options = {}) {
  const { prefer, ...rest } = options;
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      ...(prefer ? { 'Prefer': prefer } : {}),
    },
    ...rest,
  });
  if (!res.ok) throw new Error(await res.text());
  return res.status === 204 ? null : res.json();
}

// ── 상태 뱃지 색상 ────────────────────────────────────────
const statusColor = {
  '신규': 'bg-amber-100 text-amber-700',
  '연락완료': 'bg-sky-100 text-sky-700',
  '확정': 'bg-emerald-100 text-emerald-700',
  '완료': 'bg-slate-100 text-slate-600',
  '취소': 'bg-red-100 text-red-700',
};

// ── 현재 선택된 예약 ID ───────────────────────────────────
let selectedId = null;

// ── 대시보드 ─────────────────────────────────────────────
async function loadDashboard() {
  try {
    const all = await sbFetch('bookings?select=id,status,name,date,time,type,contact_type&order=created_at.desc');
    document.getElementById('stat-total').textContent = all.length;
    document.getElementById('stat-new').textContent = all.filter(b => b.status === '신규').length;
    document.getElementById('stat-confirmed').textContent = all.filter(b => b.status === '확정').length;

    const recent = all.slice(0, 5);
    const list = document.getElementById('recent-list');
    if (!recent.length) { list.innerHTML = '<div>예약 없음</div>'; return; }
    list.innerHTML = recent.map(b => `
      <div class="flex items-center justify-between rounded-2xl border border-slate-200 px-4 py-3">
        <div>
          <div class="font-medium">${b.name} / ${b.date} ${b.time?.slice(0,5)}</div>
          <div class="text-xs text-slate-500">${b.type} · ${b.contact_type}</div>
        </div>
        <span class="rounded-full px-3 py-1 text-xs font-semibold ${statusColor[b.status] || 'bg-slate-100 text-slate-600'}">${b.status}</span>
      </div>`).join('');
  } catch (e) { console.error('대시보드 로드 실패:', e); }
}

// ── 예약 목록 ─────────────────────────────────────────────
async function loadBookings() {
  const statusFilter = document.getElementById('filter-status').value;
  const dateFilter = document.getElementById('filter-date').value;

  let query = 'bookings?select=*&order=created_at.desc';
  if (statusFilter) query += `&status=eq.${encodeURIComponent(statusFilter)}`;
  if (dateFilter) query += `&date=eq.${dateFilter}`;

  const tbody = document.getElementById('bookings-tbody');
  tbody.innerHTML = '<tr><td colspan="5" class="px-3 py-6 text-center text-slate-400">불러오는 중...</td></tr>';

  try {
    const rows = await sbFetch(query);
    if (!rows?.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="px-3 py-6 text-center text-slate-400">예약 없음</td></tr>';
      return;
    }
    tbody.innerHTML = rows.map(b => `
      <tr class="cursor-pointer border-b border-slate-100 hover:bg-slate-50 ${selectedId === b.id ? 'bg-slate-50' : ''}"
          onclick="fillDetail(${JSON.stringify(b).replace(/"/g, '&quot;')})">
        <td class="px-3 py-3 font-medium">${b.name}</td>
        <td class="px-3 py-3">${b.date}</td>
        <td class="px-3 py-3">${b.type}</td>
        <td class="px-3 py-3">${b.contact_type}</td>
        <td class="px-3 py-3">
          <span class="rounded-full px-2 py-1 text-xs font-semibold ${statusColor[b.status] || ''}">${b.status}</span>
        </td>
      </tr>`).join('');
  } catch (e) {
    tbody.innerHTML = '<tr><td colspan="5" class="px-3 py-6 text-center text-red-400">로드 실패</td></tr>';
    console.error(e);
  }
}

// ── 예약 상세 ─────────────────────────────────────────────
function fillDetail(b) {
  selectedId = b.id;
  document.getElementById('detail-empty').classList.add('hidden');
  document.getElementById('detail-content').classList.remove('hidden');
  document.getElementById('d_name').textContent = b.name;
  document.getElementById('d_datetime').textContent = `${b.date} ${b.time?.slice(0,5)}`;
  document.getElementById('d_flight').textContent = b.flight_number || '-';
  document.getElementById('d_type').textContent = b.type;
  document.getElementById('d_route').textContent = `${b.pickup} → ${b.dropoff}`;
  document.getElementById('d_group').textContent = `${b.passengers}명 / 캐리어 ${b.luggage}개`;
  document.getElementById('d_contact').textContent = `${b.contact_type} / ${b.contact_value}`;
  document.getElementById('d_request').textContent = b.request || '-';
  document.getElementById('d_status').value = b.status;
  document.getElementById('saveMsg').classList.add('hidden');
}

// ── 상태 저장 ─────────────────────────────────────────────
async function saveStatus() {
  if (!selectedId) return;
  const status = document.getElementById('d_status').value;
  try {
    await sbFetch(`bookings?id=eq.${selectedId}`, {
      method: 'PATCH',
      prefer: 'return=minimal',
      body: JSON.stringify({ status }),
    });
    document.getElementById('saveMsg').classList.remove('hidden');
    setTimeout(() => document.getElementById('saveMsg').classList.add('hidden'), 2000);
    loadBookings();
    if (document.getElementById('dashboard').classList.contains('hidden') === false) loadDashboard();
  } catch (e) {
    alert('저장 실패: ' + e.message);
  }
}

// ── 요금 불러오기 ─────────────────────────────────────────
async function loadPricing() {
  try {
    const rows = await sbFetch('pricing?select=id,destination,price&order=id.asc');
    const container = document.getElementById('pricing-fields');
    container.innerHTML = rows.map(r => `
      <div>
        <label class="mb-2 block text-sm font-medium">${r.destination}</label>
        <input data-pricing-id="${r.id}" value="${r.price}" type="number"
               class="w-full rounded-2xl border border-slate-300 px-4 py-3" />
      </div>`).join('');
  } catch (e) { console.error('요금 로드 실패:', e); }
}

async function savePricing() {
  const inputs = document.querySelectorAll('[data-pricing-id]');
  try {
    await Promise.all([...inputs].map(el =>
      sbFetch(`pricing?id=eq.${el.dataset.pricingId}`, {
        method: 'PATCH',
        prefer: 'return=minimal',
        body: JSON.stringify({ price: parseInt(el.value) }),
      })
    ));
    const msg = document.getElementById('pricing-msg');
    msg.classList.remove('hidden');
    setTimeout(() => msg.classList.add('hidden'), 2000);
  } catch (e) { alert('요금 저장 실패: ' + e.message); }
}

// ── 설정 불러오기/저장 ────────────────────────────────────
async function loadSettings() {
  try {
    const rows = await sbFetch('settings?select=key,value');
    rows.forEach(r => {
      const el = document.getElementById(`s-${r.key}`);
      if (el) el.value = r.value;
    });
  } catch (e) { console.error('설정 로드 실패:', e); }
}

async function saveSettings(keys, msgId) {
  try {
    await Promise.all(keys.map(key => {
      const el = document.getElementById(`s-${key}`);
      if (!el) return;
      return sbFetch(`settings?key=eq.${key}`, {
        method: 'PATCH',
        prefer: 'return=minimal',
        body: JSON.stringify({ value: el.value }),
      });
    }));
    const msg = document.getElementById(msgId);
    msg.classList.remove('hidden');
    setTimeout(() => msg.classList.add('hidden'), 2000);
  } catch (e) { alert('저장 실패: ' + e.message); }
}

// ── 탭 전환 ──────────────────────────────────────────────
function showTab(id) {
  document.querySelectorAll('.tab-section').forEach(el => el.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  if (id === 'dashboard') loadDashboard();
  if (id === 'bookings') loadBookings();
  if (id === 'pricing') loadPricing();
  if (id === 'contact' || id === 'text') loadSettings();
}

// ── 초기화 ────────────────────────────────────────────────
showTab('dashboard');
</script>
</body>
</html>
